<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Mock to live integration: the repository swap seam">
  <defs>
    <marker id="ia" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#8E8E99"/></marker>
    <marker id="iaR" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#E50914"/></marker>
    <style>
      .title{fill:#fff;font-size:14px;font-weight:700}
      .sub{fill:#9A9AA4;font-size:11px}
      .mono{font-family:ui-monospace,Menlo,Consolas,monospace;fill:#ffb3b6;font-size:11px}
      .flow{fill:#8E8E99;font-size:10.5px;font-style:italic}
      .tag{font-size:10px;font-weight:700;letter-spacing:.5px}
    </style>
  </defs>

  <!-- UI / Cubits -->
  <rect x="340" y="26" width="320" height="60" rx="12" fill="#16161C" stroke="#2A2A33"/>
  <text class="title" x="500" y="50" text-anchor="middle">UI · Pages · Bloc / Cubit</text>
  <text class="sub" x="500" y="69" text-anchor="middle">Presentation layer — depends only on interfaces</text>
  <line x1="500" y1="86" x2="500" y2="118" stroke="#8E8E99" stroke-width="1.4" marker-end="url(#ia)"/>
  <text class="flow" x="510" y="106">calls</text>

  <!-- Repository interface = the seam -->
  <rect x="300" y="120" width="400" height="72" rx="12" fill="#16161C" stroke="#E50914" stroke-width="1.4" stroke-dasharray="7 4"/>
  <rect x="312" y="110" width="118" height="20" rx="10" fill="#2A1115" stroke="#E50914"/>
  <text class="tag" x="371" y="123.5" text-anchor="middle" fill="#ff8a8f">THE SWAP SEAM</text>
  <text class="title" x="500" y="152" text-anchor="middle">Repository interfaces · domain</text>
  <text class="sub" x="500" y="170" text-anchor="middle">Catalog · Apps · Analytics · Approvals · Developers · Flows</text>
  <text class="sub" x="500" y="184" text-anchor="middle" fill="#6E6E7A" font-size="10">abstract contracts in devportal_shared/domain/repositories</text>

  <!-- DI selector -->
  <rect x="724" y="120" width="248" height="72" rx="12" fill="#101015" stroke="#3A3A45" stroke-dasharray="4 4"/>
  <text class="title" x="848" y="143" text-anchor="middle" font-size="12.5">Dependency injection</text>
  <text class="sub" x="848" y="160" text-anchor="middle" font-size="10">app_dependencies.dart picks the impl</text>
  <text class="mono" x="848" y="180" text-anchor="middle" font-size="10.5">--dart-define=DATA_SOURCE</text>
  <path d="M724 156 H702" fill="none" stroke="#8E8E99" stroke-width="1.2" marker-end="url(#ia)"/>

  <!-- split: implemented by -->
  <path d="M500 192 V210 H255 V226" fill="none" stroke="#8E8E99" stroke-width="1.3" marker-end="url(#ia)"/>
  <path d="M500 192 V210 H745 V226" fill="none" stroke="#E50914" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#iaR)"/>
  <text class="flow" x="500" y="205" text-anchor="middle">implemented by</text>

  <!-- Mock (active) -->
  <rect x="110" y="226" width="290" height="80" rx="12" fill="#16161C" stroke="#2DD467" stroke-opacity="0.6"/>
  <rect x="122" y="216" width="92" height="20" rx="10" fill="#16321d" stroke="#2DD467"/>
  <text class="tag" x="168" y="229.5" text-anchor="middle" fill="#74e6a0">ACTIVE NOW</text>
  <text class="title" x="255" y="262" text-anchor="middle">Mock repositories</text>
  <text class="sub" x="255" y="281" text-anchor="middle">Decode bundled JSON fixtures — no network</text>
  <text class="sub" x="255" y="296" text-anchor="middle" fill="#6E6E7A" font-size="10">MockCatalogRepository, MockApps…</text>

  <!-- Live (planned) -->
  <rect x="600" y="226" width="290" height="80" rx="12" fill="#16161C" stroke="#F5A524" stroke-opacity="0.6" stroke-dasharray="6 5"/>
  <rect x="612" y="216" width="74" height="20" rx="10" fill="#33270d" stroke="#F5A524"/>
  <text class="tag" x="649" y="229.5" text-anchor="middle" fill="#ffd27a">PHASE 4</text>
  <text class="title" x="745" y="262" text-anchor="middle">Live repositories</text>
  <text class="sub" x="745" y="281" text-anchor="middle">Dio / HTTP client → Drupal BFF</text>
  <text class="sub" x="745" y="296" text-anchor="middle" fill="#6E6E7A" font-size="10">same return types as the mock</text>

  <!-- Mock -> fixtures -->
  <line x1="255" y1="306" x2="255" y2="344" stroke="#8E8E99" stroke-width="1.3" marker-end="url(#ia)"/>
  <rect x="110" y="344" width="290" height="66" rx="12" fill="#0F0F15" stroke="#2A2A33"/>
  <text class="title" x="255" y="372" text-anchor="middle" font-size="13">JSON fixtures</text>
  <text class="sub" x="255" y="391" text-anchor="middle">Hand-authored, shaped like the live API</text>
  <text class="sub" x="255" y="405" text-anchor="middle" fill="#6E6E7A" font-size="10">devportal_shared/data/fixtures</text>

  <!-- Live -> Drupal -> Apigee -->
  <line x1="745" y1="306" x2="745" y2="344" stroke="#E50914" stroke-width="1.4" marker-end="url(#iaR)"/>
  <text class="flow" x="755" y="328">HTTPS · Bearer</text>
  <rect x="600" y="344" width="290" height="60" rx="12" fill="#0F0F15" stroke="#4DA3FF" stroke-opacity="0.55" stroke-dasharray="6 5"/>
  <text class="title" x="745" y="370" text-anchor="middle" font-size="13" fill="#bcd9ff">Drupal — headless BFF</text>
  <text class="sub" x="745" y="389" text-anchor="middle">JSON:API · custom analytics REST</text>
  <line x1="745" y1="404" x2="745" y2="440" stroke="#E50914" stroke-width="1.4" marker-end="url(#iaR)"/>
  <text class="flow" x="755" y="426">Mgmt + Stats API · SA</text>
  <rect x="600" y="440" width="290" height="60" rx="12" fill="#0F0F15" stroke="#F5A524" stroke-opacity="0.55" stroke-dasharray="6 5"/>
  <text class="title" x="745" y="466" text-anchor="middle" font-size="13" fill="#ffe2ad">Apigee X</text>
  <text class="sub" x="745" y="485" text-anchor="middle">Management + Analytics (Stats) API</text>

  <!-- key message -->
  <rect x="110" y="436" width="430" height="120" rx="12" fill="#0c0c11" stroke="#2A2A33"/>
  <text x="130" y="462" fill="#fff" font-size="13" font-weight="700">Why this seam matters</text>
  <text class="sub" x="130" y="484">Today the apps run entirely on the Mock side.</text>
  <text class="sub" x="130" y="502">The mock decodes JSON through the <tspan fill="#ffb3b6" font-family="ui-monospace,Menlo,monospace">same</tspan> path a live</text>
  <text class="sub" x="130" y="518">HTTP client will use, so going live is a</text>
  <text class="sub" x="130" y="534"><tspan fill="#fff" font-weight="700">data-layer-only change</tspan> — no UI, routing or Bloc edits.</text>
  <text class="sub" x="130" y="550" fill="#6E6E7A" font-size="10">Flip the flag, drop in Live repos, ship.</text>
</svg>
